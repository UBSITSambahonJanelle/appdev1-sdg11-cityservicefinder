<div class="dashboard-page">
  <div class="dashboard-header">
    <div>
      <h1>Welcome back, Baguio Resident</h1>
      <p class="time">10:30 PM</p>
    </div>
    <button class="report-issue-btn">+ Report an Issue</button>
  </div>
  
  <div class="stats-row">
    <div class="stat-card" *ngFor="let stat of stats">
      <div class="stat-value">{{ stat.value }}</div>
      <div class="stat-label">{{ stat.label }}</div>
    </div>
  </div>
  
  <div class="dashboard-grid">
    <div class="weather-section">
      <app-weather-widget></app-weather-widget>
    </div>
    
    <div class="saved-section">
      <h3>⭐ Saved Services</h3>
      <p class="empty-message">No saved services yet. <a routerLink="/city-services">Browse City Services →</a></p>
    </div>
  </div>
  
  <div class="quick-actions-section">
    <h3>Quick Actions</h3>
    <div class="action-grid">
      <a *ngFor="let action of quickActions" [routerLink]="action.link" class="action-card">
        <span class="action-icon">{{ action.icon }}</span>
        <span>{{ action.name }}</span>
      </a>
    </div>
  </div>
</div>
