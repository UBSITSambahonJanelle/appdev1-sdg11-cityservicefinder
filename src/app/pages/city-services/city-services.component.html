<main class="city-services" aria-label="Baguio City services directory">

  <header class="page-header">
    <h1>City Services</h1>
    <p>Emergency contacts, health facilities, welfare offices, and employment support in Baguio City.</p>
  </header>

  <nav class="filter-buttons" aria-label="Filter services by category">
    @for (filter of filters; track filter) {
      <button
        type="button"
        class="filter-btn"
        [class.active]="selectedFilter === filter"
        [attr.aria-pressed]="selectedFilter === filter"
        (click)="selectedFilter = filter">
        {{ filter }}
      </button>
    }
  </nav>

  <section class="services-grid" aria-label="Services list">
    @for (service of filteredServices; track service.id) {
      <div class="card-wrapper">
        <app-service-card
          [service]="service"
          [isSaved]="isSaved(service.id)"
          (toggleSave)="onToggleSave($event)">
        </app-service-card>
        <a [routerLink]="['/city-services', service.id]" class="view-detail">
          View full details →
        </a>
      </div>
    }
  </section>

</main>
