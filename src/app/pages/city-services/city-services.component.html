

<div class="city-services">
  <h1>City Services</h1>
  <p>Emergency, health, welfare, and employment services in Baguio City.</p>

  <div class="filter-buttons">
    @for (filter of filters; track filter) {
      <button
        (click)="selectedFilter = filter"
        [class.active]="selectedFilter === filter"
        class="filter-btn">
        {{ filter }}
      </button>
    }
  </div>

  <div class="services-grid">
    
    @for (service of filteredServices; track service.id) {
      <app-service-card
        [service]="service"
        [isSaved]="isSaved(service.id)"
        (toggleSave)="onToggleSave($event)">
      </app-service-card>
    }
  </div>
</div>
