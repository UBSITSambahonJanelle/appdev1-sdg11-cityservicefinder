<div class="home">
  <!-- Hero Section -->
  <div class="hero">
    <h1>Your City, Your Services</h1>
    <p>Find emergency contacts, health services, public transport and more — all in one place for Baguio City residents.</p>
    <div class="search-box">
      <input type="text" placeholder="Search services, offices, hotlines...">
      <button>Search</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-value">24/7</div>
      <div class="stat-label">Emergency hotlines</div>
    </div>
    <div class="stat">
      <div class="stat-value">12</div>
      <div class="stat-label">Jeepney routes</div>
    </div>
    <div class="stat">
      <div class="stat-value">18°</div>
      <div class="stat-label">Light Fog</div>
    </div>
  </div>

  <!-- Services -->
  <div class="services">
    <h2>Available Services</h2>
    <div class="services-grid">
      <app-service-card *ngFor="let service of services" 
                        [service]="service"
                        (toggleSave)="onToggleSave($event)">
      </app-service-card>
    </div>
  </div>

  <!-- Widgets -->
  <div class="widgets">
    <app-weather-widget></app-weather-widget>
    <app-quick-actions></app-quick-actions>
  </div>
</div>
