<div class="login-page">
  <div class="login-card">
    <div class="login-logo">🏔️</div>
    <h1>City Service Finder</h1>
    <p class="login-sub">Sign in to access your dashboard and report issues</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="yourname@email.com" [(ngModel)]="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Enter your password" [(ngModel)]="password" name="password" required>
          <button type="button" class="toggle-pwd" (click)="togglePasswordVisibility()">{{ showPassword ? '🙈' : '👁️' }}</button>
        </div>
      </div>

      @if (errorMsg) {
        <div class="error-message">{{ errorMsg }}</div>
      }

      @if (successMsg) {
        <div class="success-message">{{ successMsg }}</div>
      }

      <button type="submit" class="login-btn" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="signup-prompt">Don't have an account? <a routerLink="/signup">Create one here</a></p>
  </div>
</div>
