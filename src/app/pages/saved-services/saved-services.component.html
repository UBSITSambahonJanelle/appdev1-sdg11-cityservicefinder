<main class="saved-services" aria-label="Your saved city services">
  <header>
    <h1>⭐ Saved Services</h1>
    <p>Services you have saved for quick access.</p>
  </header>

  @if (cityService.savedServices().length === 0) {
    <section class="empty-state" aria-label="No saved services">
      <p>You haven't saved any services yet.</p>
      <p>Browse <a routerLink="/city-services">City Services</a> and tap ☆ Save to add them here.</p>
    </section>
  } @else {
    <section class="saved-grid" aria-label="List of saved services">
      @for (service of cityService.savedServices(); track service.id) {
        <app-service-card
          [service]="service"
          [isSaved]="true"
          (toggleSave)="onToggleSave($event)">
        </app-service-card>
      }
    </section>
  }
</main>
