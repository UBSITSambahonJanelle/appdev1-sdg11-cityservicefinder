<div class="signup-page">
  <div class="signup-card">
    <div class="signup-logo">🏔️</div>
    <h1>Create an Account</h1>
    <p class="signup-sub">Join City Service Finder to access all features</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name" [(ngModel)]="name" name="name" required>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="yourname@email.com" [(ngModel)]="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" placeholder="Create a password (min. 6 characters)" [(ngModel)]="password" name="password" required>
          <button type="button" class="eye-btn" (click)="togglePassword()">
            {{ showPassword ? '👁' : '👁️‍🗨️' }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrapper">
          <input [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Confirm your password" [(ngModel)]="confirmPassword" name="confirmPassword" required>
          <button type="button" class="eye-btn" (click)="toggleConfirmPassword()">
            {{ showConfirmPassword ? '👁' : '👁️‍🗨️' }}
          </button>
        </div>
      </div>

      <div *ngIf="errorMsg" class="error-message">{{ errorMsg }}</div>
      <div *ngIf="successMsg" class="success-message">{{ successMsg }}</div>

      <button type="submit" class="signup-btn" [disabled]="isLoading">
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="login-prompt">
      Already have an account? <a routerLink="/login">Sign in here</a>
    </p>
  </div>
</div>
