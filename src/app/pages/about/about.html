<h1>🌍 About SDG 11 - Sustainable Cities</h1>
<p>SDG 11 aims to make cities inclusive, safe, resilient, and sustainable.</p>

<input 
  type="text" 
  placeholder="Search country..." 
  (input)="onSearch($event)"
  style="width: 100%; padding: 10px; margin: 20px 0;"
/>

<div *ngIf="loading">Loading countries...</div>

<div *ngIf="!loading">
  <div *ngFor="let country of filteredCountries" style="border: 1px solid #ccc; margin: 10px; padding: 10px; display: inline-block; width: 200px;">
    <img [src]="country.flags.png" style="width: 100%; height: 120px; object-fit: cover;" />
    <h3>{{ country.name.common }}</h3>
    <p>Capital: {{ getCapital(country) }}</p>
    <p>Population: {{ country.population | number }}</p>
  </div>
</div>
