<div *ngIf="loading()">Loading weather...</div>

<div *ngIf="!loading() && weather()">

  <div class="weather-temp">
    {{ weather().main.temp }}°C
  </div>

  <div class="weather-condition">
    {{ weather().weather[0].description }}
  </div>

  <div class="weather-stats">
     Humidity {{ weather().main.humidity }}%
  </div>

</div>
